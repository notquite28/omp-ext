name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install omp-grok-build dependencies
        working-directory: plugins/omp-grok-build
        run: bun install --frozen-lockfile

      - name: Typecheck omp-grok-build
        working-directory: plugins/omp-grok-build
        run: bun run typecheck

      - name: Test omp-grok-build
        working-directory: plugins/omp-grok-build
        run: bun test

      - name: Test omp-rewind
        working-directory: plugins/omp-rewind
        run: bun tests/core.test.ts

      - name: Validate catalog and tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          marketplace="$(bun -e "const m = await import('./.claude-plugin/marketplace.json', { with: { type: 'json' } }); console.log(m.default.metadata?.version ?? '')")"
          root="$(bun -e "const p = await import('./package.json', { with: { type: 'json' } }); console.log(p.default.version)")"

          bun -e '
            import catalog from "./.claude-plugin/marketplace.json" with { type: "json" };
            import { readFileSync } from "fs";
            let failed = false;
            for (const plugin of catalog.plugins) {
              const src = String(plugin.source).replace(/^\.\//, "");
              const pkg = JSON.parse(readFileSync(`${src}/package.json`, "utf8"));
              if (pkg.name !== plugin.name || pkg.version !== plugin.version) {
                console.error(`mismatch ${plugin.name}: catalog ${plugin.version} package ${pkg.name}@${pkg.version}`);
                failed = true;
              } else {
                console.log(`ok ${plugin.name}@${plugin.version}`);
              }
            }
            if (failed) process.exit(1);
          '

          if [ -n "$marketplace" ] && [ "$marketplace" != "$tag" ]; then
            echo "Tag v$tag does not match marketplace metadata.version $marketplace" >&2
            exit 1
          fi
          if [ "$root" != "$tag" ]; then
            echo "Tag v$tag does not match root package.json version $root" >&2
            exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"

      - name: Package source archive
        run: |
          version="${{ steps.version.outputs.version }}"
          git archive \
            --format=tar.gz \
            --prefix="omp-grok-build-marketplace-${version}/" \
            -o "omp-grok-build-marketplace-${version}.tar.gz" \
            HEAD

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: omp-grok-build-marketplace-${{ steps.version.outputs.version }}.tar.gz
