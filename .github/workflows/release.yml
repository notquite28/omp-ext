name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install omp-grok-build dependencies
        working-directory: plugins/omp-grok-build
        run: bun install --frozen-lockfile

      - name: Typecheck omp-grok-build
        working-directory: plugins/omp-grok-build
        run: bun run typecheck

      - name: Test omp-grok-build
        working-directory: plugins/omp-grok-build
        run: bun test

      - name: Test omp-rewind
        working-directory: plugins/omp-rewind
        run: bun run test

      - name: Validate marketplace catalog
        run: bun scripts/validate-marketplace.ts

      - name: Validate tag matches marketplace metadata
        id: version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          marketplace="$(bun -e "const m = await import('./.claude-plugin/marketplace.json', { with: { type: 'json' } }); console.log(m.default.metadata?.version ?? '')")"
          root="$(bun -e "const p = await import('./package.json', { with: { type: 'json' } }); console.log(p.default.version)")"

          if [ -n "$marketplace" ] && [ "$marketplace" != "$tag" ]; then
            echo "Tag v$tag does not match marketplace metadata.version $marketplace" >&2
            exit 1
          fi
          if [ "$root" != "$tag" ]; then
            echo "Tag v$tag does not match root package.json version $root" >&2
            exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"

      - name: Package source archive
        run: |
          version="${{ steps.version.outputs.version }}"
          git archive \
            --format=tar.gz \
            --prefix="omp-ext-${version}/" \
            -o "omp-ext-${version}.tar.gz" \
            HEAD

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: omp-ext-${{ steps.version.outputs.version }}.tar.gz
